<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NeatoCleaning UAE | Premium Airbnb Management & Cleaning</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
      :root {
        --brand-teal: #14b8a6;
      }
      
      body {
        font-family: 'Inter', 'Cairo', sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        overflow-x: hidden;
      }

      /* Custom Scrollbar */
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #f1f1f1;
      }
      .dark ::-webkit-scrollbar-track {
        background: #1f2937;
      }
      ::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: var(--brand-teal);
      }

      /* Sophisticated Floating Bubbles */
      @keyframes float-bubble {
        0%, 100% { transform: translateY(0) translateX(0) rotate(0deg); }
        33% { transform: translateY(-30px) translateX(15px) rotate(2deg); }
        66% { transform: translateY(-15px) translateX(-20px) rotate(-1deg); }
      }

      .floating-bubble {
        animation: float-bubble 10s cubic-bezier(0.45, 0, 0.55, 1) infinite;
      }

      /* Logo Bubbling Effect */
      @keyframes bubble-pulse {
        0%, 100% { transform: scale(1); filter: brightness(1); }
        50% { transform: scale(1.1); filter: brightness(1.2); }
      }
      .logo-bubble {
        animation: bubble-pulse 4s ease-in-out infinite;
      }

      /* Advanced Scroll Reveal */
      .scroll-reveal {
        opacity: 0;
        transform: translateY(40px) scale(0.98);
        filter: blur(8px);
        transition: all 1.2s cubic-bezier(0.22, 1, 0.36, 1);
      }

      .scroll-reveal.active {
        opacity: 1;
        transform: translateY(0) scale(1);
        filter: blur(0);
      }

      /* Field Entry Animation */
      .field-reveal {
        opacity: 0;
        transform: translateX(-10px);
        transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
      }
      .field-reveal.active {
        opacity: 1;
        transform: translateX(0);
      }

      /* Step Transition */
      .step-enter {
        animation: step-in 0.5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
      }
      @keyframes step-in {
        from { opacity: 0; transform: translateX(20px); filter: blur(10px); }
        to { opacity: 1; transform: translateX(0); filter: blur(0); }
      }

      /* Sophisticated Text Reveal */
      .reveal-text {
        opacity: 0;
        transform: translateY(30px) skewY(3deg);
        filter: blur(10px);
        animation: reveal-text-anim 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }

      @keyframes reveal-text-anim {
        to {
          opacity: 1;
          transform: translateY(0) skewY(0);
          filter: blur(0);
        }
      }

      /* Card Hover Glow */
      .card-glow {
        position: relative;
        overflow: hidden;
      }
      .card-glow::after {
        content: '';
        position: absolute;
        inset: 0;
        background: radial-gradient(circle at var(--mouse-x, 50%) var(--mouse-y, 50%), rgba(20, 184, 166, 0.15) 0%, transparent 70%);
        opacity: 0;
        transition: opacity 0.4s ease;
        pointer-events: none;
      }
      .card-glow:hover::after {
        opacity: 1;
      }

      .animate-soap-bubble {
        position: relative;
        z-index: 0;
      }

      .animate-soap-bubble::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        border-radius: inherit;
        border: 2px solid var(--brand-teal);
        animation: soap-bubble 3s cubic-bezier(0.4, 0, 0.2, 1) infinite;
        z-index: -1;
      }

      @keyframes soap-bubble {
        0% { transform: scale(1); opacity: 0.7; }
        100% { transform: scale(1.3); opacity: 0; }
      }
    </style>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              brand: {
                50: '#f0fdfa',
                100: '#ccfbf1',
                500: '#14b8a6',
                600: '#0d9488',
                700: '#0f766e',
              }
            },
            animation: {
              'spin-slow': 'spin 12s linear infinite',
              'pulse-slow': 'pulse 8s ease-in-out infinite',
            }
          }
        }
      }
    </script>

</html>
